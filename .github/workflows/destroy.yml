name: Terraform Destroy
on:
  workflow_dispatch: # Manual trigger only

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./terraform 
        run: terraform init -backend-config="bucket=hebrewsapp-497162053259-ap-southeast-1-an"

      - name: Terraform Destroy
        working-directory: ./terraform 
        run: terraform destroy -target=aws_ecs_express_gateway_service.api
        env:
          TF_VAR_db_password: ${{ secrets.RDS_PASSWORD }} 
          TF_VAR_app_environment: 'Development' 
          TF_VAR_swagger_username: ${{ secrets.SWAGGER_USERNAME }} 
          TF_VAR_swagger_password: ${{ secrets.SWAGGER_PASSWORD }} 
