name: Deploy API
on:
  workflow_dispatch:
  # push:
  #  branches: [ "main" ]

env:
  AWS_REGION:  ap-southeast-1 # Philippines/Singapore region
  ECR_REPOSITORY: hebrews-api             # Your ECR repo name
  TF_WORKING_DIR: ./terraform         # Where your App Terraform lives

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      # - name: Configure AWS Credentials
      #  uses: aws-actions/configure-aws-credentials@v4
      #  with:
      #    role-to-assume: ${{ secrets.AWS_ROLE_ARN }} # The ARN from Step 3
      #    aws-region: ap-southeast-1 # Philippines/Singapore region
      #    audience: sts.amazonaws.com    

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }} # Use the commit hash as the version
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        # This passes the new image tag into your Terraform variable
        run: |
          terraform apply \
            -var="image_tag=${{ github.sha }}" \
            -var="swagger_username=${{ secrets.SWAGGER_USERNAME }}" \
            -var="swagger_password=${{ secrets.SWAGGER_PASSWORD }}" \
            -auto-approve
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.RDS_PASSWORD }} 
          TF_VAR_app_environment: 'Development' 
          TF_VAR_swagger_username: ${{ secrets.SWAGGER_USERNAME }} 
          TF_VAR_swagger_password: ${{ secrets.SWAGGER_PASSWORD }} 
